<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #one{
            height: 600px;
            width: 600px;
            border: 10px solid #0000ff;
            border-radius: 50%;
            background-color: #ADD8E6;
             display: flex;
            justify-content: center;
            align-items: center;
        }
        #two{
            height: 400px;
            width: 400px;
            border: 10px solid red;
            border-radius: 50%;
            background-color: #FFCCCB;
             display: flex;
            justify-content: center;
            align-items: center;
        }
        #three{
            height: 200px;
            width: 200px;
            border: 10px solid green;
            border-radius: 50%;
            background-color: #D1FFBD;
            text-align: center;
             display: flex;
            justify-content: center;
            align-items: center;
        }
        #main-container{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        h1{
            color: black;
            text-shadow: 3px 3px 3px blue;
        }
        
    </style>
</head>
<body>
    <div id="main-container">
        <div id="one">
        <div id="two">
            <div id="three"><h1>Full Stack Developer</h1></div>
        </div>
    </div>
    </div>
    
</body>
</html>
